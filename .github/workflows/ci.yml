name: CI

on:
  push:
    branches:
      - main
      - stage
      - dev
      - "feat/**"
      - "fix/**"
  pull_request:
    branches:
      - main
      - stage
      - dev

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Build production application
        run: npm run build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: wa_os_test
          POSTGRES_USER: wa_os
          POSTGRES_PASSWORD: wa_os_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wa_os -d wa_os_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    defaults:
      run:
        working-directory: apps/api

    env:
      APP_ENV: testing
      APP_KEY: base64:nfiP1QHLvRfx4bQH9x9N7Gjx3yN3N8P7tT6u5v4w3xY=
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: wa_os_test
      DB_USERNAME: wa_os
      DB_PASSWORD: wa_os_test
      CACHE_STORE: array
      QUEUE_CONNECTION: sync
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, pdo_pgsql, redis
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache/files
          key: composer-${{ runner.os }}-${{ hashFiles('apps/api/composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Check code style
        run: vendor/bin/pint --test

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test

  infrastructure:
    name: Infrastructure
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Validate Docker Compose
        run: docker compose config --quiet

      - name: Check repository whitespace
        run: git diff --check HEAD^ HEAD
